server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: money-tracker
  datasource:
    username: postgres
    password: postgres
    url: jdbc:postgresql://localhost:5432/moneytracker
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        show_sql: true